name: PI Assistant

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  pi-response:
    if: contains(github.event.comment.body, '@pi')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install PI
        run: npm install -g @mariozechner/pi-coding-agent

      - name: Run PI Action
        uses: ./  # Dogfooding: use the action from this repo
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          pi_auth_json: ${{ secrets.PI_AUTH_JSON }}
